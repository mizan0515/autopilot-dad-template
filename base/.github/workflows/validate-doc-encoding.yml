name: Validate Doc Encoding

on:
  pull_request:
    paths:
      - '**/*.md'
      - 'tools/Validate-Documents.ps1'
      - '.github/workflows/validate-doc-encoding.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - 'tools/Validate-Documents.ps1'
      - '.github/workflows/validate-doc-encoding.yml'

jobs:
  validate-encoding:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Markdown Encoding
        shell: pwsh
        run: ./tools/Validate-Documents.ps1 -IncludeRootGuides -IncludeAgentDocs
