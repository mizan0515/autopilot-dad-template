<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="page-title">Autopilot Dashboard</title>
  <style>
    :root {
      --bg: #f8f3ea;
      --card: #fff;
      --border: #e8dcc6;
      --text: #2a1e12;
      --muted: #7a6a57;
      --accent: #b35a1a;
      --good: #2d7a3f;
      --warn: #b37c1a;
      --bad: #b33030;
    }
    body { margin:0; font-family: -apple-system, "Segoe UI", "Noto Sans", "Apple SD Gothic Neo", sans-serif; background:var(--bg); color:var(--text); line-height:1.55; }
    .shell { max-width: 1200px; margin: 32px auto; padding: 0 24px; }
    section, .panel, .hero, .signal-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px 24px; }
    .hero { padding: 32px; margin-bottom: 20px; }
    .eyebrow { color: var(--accent); font-weight: 700; font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; }
    h1 { margin: 8px 0 12px; font-size: 32px; }
    h2 { margin-top: 0; font-size: 20px; }
    h3 { font-size: 16px; margin: 0 0 6px; }
    p, .muted { color: var(--muted); margin: 0 0 12px; }
    .hero-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 20px; }
    .hero-card { background: var(--bg); border-radius: 12px; padding: 14px 16px; }
    .hero-card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    .hero-card .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .story-list { display: flex; flex-direction: column; gap: 12px; }
    .story-card { background: var(--bg); border-radius: 12px; padding: 14px 16px; }
    .story-top { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .story-badge { background: var(--card); border: 1px solid var(--border); border-radius: 999px; padding: 2px 10px; font-size: 12px; font-weight: 700; color: var(--accent); }
    .empty { color: var(--muted); font-style: italic; padding: 12px; text-align: center; }
    .help-row { display: grid; grid-template-columns: 120px 1fr; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .help-row:last-child { border-bottom: none; }
    .help-term { font-weight: 700; color: var(--accent); }
    .footer { color: var(--muted); font-size: 12px; text-align: right; margin-top: 16px; }
    @media (max-width: 900px) {
      .two-col, .hero-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell" id="app"></main>
  <script>
    const data = __OPERATOR_DASHBOARD_JSON__;
    const t = data.strings || {};
    const d = t.dashboard || {};
    const statusLabels = t.status_labels || {};
    document.getElementById('page-title').textContent = d.page_title || 'Autopilot Dashboard';

    function esc(v) { return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function htmlOrEsc(v) { return String(v ?? '').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function renderTimeline(items) {
      if (!items || !items.length) return `<div class="empty">${esc(d.empty_timeline)}</div>`;
      return items.map(i => `
        <article class="story-card">
          <h3>${esc(i.title)}</h3>
          <p>${esc(i.summary)}</p>
        </article>`).join('');
    }

    function renderDadSessions(items) {
      if (!items || !items.length) return `<div class="empty">${esc(d.empty_dad)}</div>`;
      return items.map(i => `
        <article class="story-card">
          <div class="story-top">
            <span class="story-badge">turn ${esc(i.turn || 0)}</span>
            <span>${esc(i.status_label)}${i.checkpoints ? ' · ' + esc(i.checkpoints) : ''}</span>
          </div>
          <h3>${esc(i.session_id)}</h3>
          <p>${esc(i.task)}</p>
        </article>`).join('');
    }

    function renderPrs(items) {
      if (!items || !items.length) return `<div class="empty">${esc(d.empty_prs)}</div>`;
      return items.map(i => {
        const flags = [];
        if (i.draft) flags.push('draft');
        if (i.lang_mismatch) flags.push(esc(d.pr_lang_mismatch || 'title language mismatch'));
        return `
        <article class="story-card">
          <div class="story-top">
            <span class="story-badge">PR #${esc(i.number)}</span>
            <span>${flags.join(' · ')}</span>
          </div>
          <h3><a href="${esc(i.url)}">${esc(i.title)}</a></h3>
          <p class="muted">${esc(i.branch)}</p>
        </article>`;
      }).join('');
    }

    function renderGlossary(items) {
      if (!items || !items.length) return '';
      return items.map(i => `
        <div class="help-row">
          <div class="help-term">${esc(i.term)}</div>
          <div>${esc(i.meaning)}</div>
        </div>`).join('');
    }

    const summary = data.summary || {};
    const meta = data.meta || {};

    document.getElementById('app').innerHTML = `
      <section class="hero">
        <div class="eyebrow">${htmlOrEsc(d.eyebrow)}</div>
        <h1>${htmlOrEsc(d.title)}</h1>
        <p>${d.subtitle || ''}</p>
        <div class="hero-grid">
          <div class="hero-card"><div class="label">${esc(d.last_updated)}</div><div class="value">${esc(meta.generated_at)}</div></div>
          <div class="hero-card"><div class="label">${esc(d.progress)}</div><div class="value">iter ${esc(summary.iteration)}</div></div>
          <div class="hero-card"><div class="label">${esc(d.open_prs)}</div><div class="value">${esc(summary.open_pr_count)}</div></div>
          <div class="hero-card"><div class="label">${esc(d.now_status)}</div><div class="value">${summary.halted ? '🛑 HALT' : (summary.locked ? '🔄 running' : '💤 idle')}</div></div>
        </div>
      </section>

      <section class="two-col">
        <div class="panel">
          <h2>${htmlOrEsc(d.recent_flow)}</h2>
          <div class="story-list">${renderTimeline(data.timeline || [])}</div>
        </div>
        <div class="panel">
          <h2>${htmlOrEsc(d.open_pr_pane)}</h2>
          <div class="story-list">${renderPrs(data.prs || [])}</div>
        </div>
      </section>

      <section class="panel" style="margin-bottom:20px;">
        <h2>${htmlOrEsc(d.dad_sessions)}</h2>
        <p class="muted">${esc(d.dad_sessions_hint)}</p>
        <div class="story-list">${renderDadSessions(data.dad_sessions || [])}</div>
      </section>

      <section class="panel">
        <h2>${htmlOrEsc(d.glossary_title)}</h2>
        <p class="muted">${esc(d.glossary_hint)}</p>
        ${renderGlossary(t.glossary || [])}
        <div class="footer">project: ${esc(meta.project_name)} · locale: ${esc(meta.locale)} · template: ${esc(meta.template_version)}</div>
      </section>
    `;
  </script>
</body>
</html>
